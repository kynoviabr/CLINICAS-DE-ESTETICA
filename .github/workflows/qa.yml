name: QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        if: ${{ secrets.E2E_USER_EMAIL != '' && secrets.E2E_USER_PASSWORD != '' }}
        run: npx playwright install --with-deps chromium

      - name: E2E Smoke
        if: ${{ secrets.E2E_USER_EMAIL != '' && secrets.E2E_USER_PASSWORD != '' }}
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_LEAD_NAME: ${{ secrets.E2E_LEAD_NAME }}
          E2E_AGENDA_LEAD_NAME: ${{ secrets.E2E_AGENDA_LEAD_NAME }}
        run: npm run test:e2e:smoke

      - name: E2E Flows
        if: ${{ secrets.E2E_USER_EMAIL != '' && secrets.E2E_USER_PASSWORD != '' }}
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_LEAD_NAME: ${{ secrets.E2E_LEAD_NAME }}
          E2E_AGENDA_LEAD_NAME: ${{ secrets.E2E_AGENDA_LEAD_NAME }}
        run: npm run test:e2e:flow
